<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Infection Simulator</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{
font-family:Arial;
background:#f4f4f4;
text-align:center;
margin:20px;
}

canvas{
border:1px solid black;
background:white;
margin-top:10px;
}

.sliderBox{margin:6px;}

.diseaseBlock{
border:1px solid #ccc;
background:white;
padding:8px;
margin:6px;
display:inline-block;
}

.stats{
font-size:18px;
margin:10px;
}

#status{
font-weight:bold;
color:darkred;
margin-top:10px;
}
</style>
</head>

<body>

<h1>Infection Simulator</h1>

<canvas id="simCanvas" width="900" height="500"></canvas>

<div class="sliderBox">
Population
<input type="range" id="popSlider" min="50" max="2000" value="500">
<span id="popValue"></span>
</div>

<div class="sliderBox">
Starting Infected
<input type="range" id="startSlider" min="1" max="50" value="5">
<span id="startValue"></span>
</div>

<div class="sliderBox">
Movement Speed
<input type="range" id="moveSlider" min="0" max="5" step="0.2" value="1">
<span id="moveValue"></span>
</div>

<button onclick="addDisease()">Add Disease</button>

<div id="diseaseControls"></div>

<div>
<button onclick="start()">Play</button>
<button onclick="pause()">Pause</button>
<button onclick="reset()">Reset</button>
</div>

<div class="stats">
Day: <span id="time">0</span> |
Healthy: <span id="healthy">0</span>
</div>

<div id="status"></div>

<h2>Population Graph</h2>

<canvas id="graphCanvas" width="900" height="350"></canvas>

<script>

let canvas=document.getElementById("simCanvas")
let ctx=canvas.getContext("2d")

let people=[]
let diseases=[]
let chart=null
let timer=null

let simTime=0
let lastDay=0

const tickMS=50
const dayLength=1000

let infectionBuffer=[]
let infectionAccumulator=[]

const colors=[
"red","blue","purple","orange","brown",
"black","magenta","cyan","gold","green"
]

function updateSliderLabels(){
popValue.innerText=popSlider.value
startValue.innerText=startSlider.value
moveValue.innerText=moveSlider.value
}

document.querySelectorAll("input[type=range]").forEach(s=>{
s.oninput=updateSliderLabels
})

function addDisease(){

let id=diseases.length

diseases.push({
name:"Disease "+(id+1),
color:colors[id%colors.length],
infectivity:2,
model:"exponential"
})

renderDiseaseControls()
reset()
}

function removeDisease(i){
diseases.splice(i,1)
renderDiseaseControls()
reset()
}

function renderDiseaseControls(){

let container=document.getElementById("diseaseControls")
container.innerHTML=""

diseases.forEach((d,i)=>{

let div=document.createElement("div")
div.className="diseaseBlock"

div.innerHTML=`
<input value="${d.name}"
oninput="diseases[${i}].name=this.value">

<br>

<b style="color:${d.color}">Color</b>

<br>

Infectivity (x)
<input type="range"
min="1"
max="10"
step="1"
value="${d.infectivity}"
oninput="diseases[${i}].infectivity=parseInt(this.value);document.getElementById('infVal${i}').innerText=this.value">

<span id="infVal${i}">${d.infectivity}</span>

<br>

Model
<select onchange="diseases[${i}].model=this.value">

<option value="exponential" ${d.model==="exponential"?"selected":""}>Exponential</option>
<option value="quadratic" ${d.model==="quadratic"?"selected":""}>Quadratic</option>
<option value="linear" ${d.model==="linear"?"selected":""}>Linear</option>

</select>

<br>

<button onclick="removeDisease(${i})">Remove</button>
`

container.appendChild(div)
})
}

function reset(){

pause()

people=[]
infectionBuffer=[]
infectionAccumulator=[]
simTime=0
lastDay=0

document.getElementById("status").innerText=""

let population=parseInt(popSlider.value)
let start=parseInt(startSlider.value)

for(let i=0;i<population;i++){
people.push({
x:Math.random()*canvas.width,
y:Math.random()*canvas.height,
disease:null
})
}

let index=0

for(let d=0;d<diseases.length;d++){

for(let i=0;i<start;i++){
if(index<people.length){
people[index].disease=d
index++
}
}

infectionBuffer.push(0)
infectionAccumulator.push(0)
}

initGraph()
draw()
updateStats()
}

function findClosestHealthy(px,py){

let closest=null
let bestDist=Infinity

for(let p of people){

if(p.disease!==null) continue

let dx=p.x-px
let dy=p.y-py
let dist=dx*dx+dy*dy

if(dist<bestDist){
bestDist=dist
closest=p
}
}

return closest
}

function step(){

simTime+=tickMS

let moveSpeed=parseFloat(moveSlider.value)

for(let p of people){

p.x+=(Math.random()-0.5)*moveSpeed*4
p.y+=(Math.random()-0.5)*moveSpeed*4

p.x=Math.max(0,Math.min(canvas.width,p.x))
p.y=Math.max(0,Math.min(canvas.height,p.y))
}

let day=Math.floor(simTime/dayLength)

if(day>lastDay){

let counts=new Array(diseases.length).fill(0)

for(let p of people)
if(p.disease!==null) counts[p.disease]++

for(let i=0;i<diseases.length;i++){

let x=diseases[i].infectivity
let infected=counts[i]

let newCases=0

if(diseases[i].model==="linear")
newCases=x

else if(diseases[i].model==="quadratic")
newCases=x*x

else
newCases=infected*x

infectionBuffer[i]+=newCases
}

lastDay=day
}

for(let i=0;i<diseases.length;i++){

let perTick=infectionBuffer[i]/(dayLength/tickMS)

infectionAccumulator[i]+=perTick

while(infectionAccumulator[i]>=1){

let carriers=people.filter(p=>p.disease===i)
if(carriers.length===0) break

let carrier=carriers[Math.floor(Math.random()*carriers.length)]

let target=findClosestHealthy(carrier.x,carrier.y)
if(!target) break

target.disease=i

infectionAccumulator[i]-=1
infectionBuffer[i]-=1
}
}

draw()
updateStats()
updateGraph()

if(people.every(p=>p.disease!==null)){
pause()
document.getElementById("status").innerText="Simulation finished: entire population infected."
}
}

function draw(){

ctx.clearRect(0,0,canvas.width,canvas.height)

for(let p of people){

ctx.beginPath()
ctx.arc(p.x,p.y,3,0,Math.PI*2)

if(p.disease===null)
ctx.fillStyle="white"
else
ctx.fillStyle=diseases[p.disease].color

ctx.fill()
ctx.stroke()
}
}

function updateStats(){

let healthy=people.filter(p=>p.disease===null).length

document.getElementById("time").innerText=(simTime/1000).toFixed(2)
document.getElementById("healthy").innerText=healthy
}

function start(){
pause()
timer=setInterval(step,tickMS)
}

function pause(){
if(timer){
clearInterval(timer)
timer=null
}
}

function initGraph(){

if(chart) chart.destroy()

let ctx=document.getElementById("graphCanvas")

let datasets=[{
label:"Healthy",
borderColor:"green",
data:[people.filter(p=>p.disease===null).length]
}]

diseases.forEach((d,i)=>{
datasets.push({
label:d.name,
borderColor:d.color,
data:[people.filter(p=>p.disease===i).length]
})
})

chart=new Chart(ctx,{
type:"line",
data:{labels:[0],datasets:datasets},
options:{
animation:false,
scales:{
x:{title:{display:true,text:"Days"}},
y:{title:{display:true,text:"Population"}}
}
}
})
}

function updateGraph(){

let t=simTime/1000

chart.data.labels.push(t)

let healthy=0
let counts=new Array(diseases.length).fill(0)

for(let p of people){

if(p.disease===null) healthy++
else counts[p.disease]++
}

chart.data.datasets[0].data.push(healthy)

for(let i=0;i<diseases.length;i++)
chart.data.datasets[i+1].data.push(counts[i])

chart.update()
}

updateSliderLabels()
addDisease()

</script>

</body>
</html>
