<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Infection Simulator</title>

<style>

body{
font-family:Arial;
text-align:center;
background:#f4f4f4;
}

canvas{
border:1px solid black;
background:white;
}

.controls{
margin:10px;
}

</style>

</head>

<body>

<h1>Infection Simulator</h1>

<div class="controls">

Population
<input type="range" id="popSlider" min="50" max="400" value="200">

Starting Infected
<input type="range" id="startSlider" min="1" max="20" value="3">

Infectivity
<input type="range" id="infSlider" min="0" max="1" step="0.01" value="0.4">

Neighbors (k)
<input type="range" id="kSlider" min="1" max="10" value="3">

</div>

<div class="controls">

<button onclick="start()">Start</button>
<button onclick="pause()">Pause</button>
<button onclick="reset()">Reset</button>

Speed
<input type="range" id="speedSlider" min="10" max="500" value="100">

</div>

<canvas id="simCanvas" width="800" height="500"></canvas>

<script>

let canvas=document.getElementById("simCanvas")
let ctx=canvas.getContext("2d")

let people=[]
let running=false
let timer

function reset(){

people=[]

let population=parseInt(popSlider.value)
let startInf=parseInt(startSlider.value)

for(let i=0;i<population;i++){

people.push({
x:Math.random()*canvas.width,
y:Math.random()*canvas.height,
infected:false
})

}

for(let i=0;i<startInf;i++){
people[i].infected=true
}

draw()

}

function distance(a,b){

return Math.sqrt((a.x-b.x)**2+(a.y-b.y)**2)

}

function step(){

let infectivity=parseFloat(infSlider.value)
let k=parseInt(kSlider.value)

let newInfections=[]

for(let p of people){

if(!p.infected)continue

let sorted=[...people]

sorted.sort((a,b)=>distance(p,a)-distance(p,b))

for(let i=1;i<=k;i++){

let neighbor=sorted[i]

if(!neighbor.infected){

if(Math.random()<infectivity){

newInfections.push(neighbor)

}

}

}

}

for(let n of newInfections){
n.infected=true
}

draw()

}

function draw(){

ctx.clearRect(0,0,canvas.width,canvas.height)

for(let p of people){

ctx.beginPath()

ctx.arc(p.x,p.y,4,0,Math.PI*2)

ctx.fillStyle=p.infected?"red":"white"

ctx.fill()

ctx.stroke()

}

}

function start(){

running=true

timer=setInterval(step,speedSlider.value)

}

function pause(){

clearInterval(timer)

}

reset()

</script>

</body>
</html>
