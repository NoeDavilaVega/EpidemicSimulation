<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Infection Simulator</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
font-family:Arial;
background:#f4f4f4;
text-align:center;
margin:20px;
}

canvas{
border:1px solid black;
background:white;
margin-top:10px;
}

.sliderBox{
margin:6px;
}

.diseaseBlock{
border:1px solid #ccc;
background:white;
padding:8px;
margin:6px;
display:inline-block;
}

.stats{
font-size:18px;
margin:10px;
}

</style>
</head>

<body>

<h1>Infection Simulator</h1>

<canvas id="simCanvas" width="900" height="500"></canvas>

<div class="sliderBox">
Population
<input type="range" id="popSlider" min="50" max="500" value="250">
<span id="popValue"></span>
</div>

<div class="sliderBox">
Starting Infected (per disease)
<input type="range" id="startSlider" min="1" max="20" value="5">
<span id="startValue"></span>
</div>

<div class="sliderBox">
Movement Speed
<input type="range" id="moveSlider" min="0" max="5" step="0.2" value="1">
<span id="moveValue"></span>
</div>

<div class="sliderBox">
Simulation Speed (ms)
<input type="range" id="speedSlider" min="10" max="400" value="80">
<span id="speedValue"></span>
</div>

<button onclick="addDisease()">Add Disease</button>

<div id="diseaseControls"></div>

<div>
<button onclick="start()">Play</button>
<button onclick="pause()">Pause</button>
<button onclick="reset()">Reset</button>
</div>

<div class="stats">
Time: <span id="time">0</span> |
Healthy: <span id="healthy">0</span>
</div>

<h2>Population Graph</h2>

<canvas id="graphCanvas" width="900" height="350"></canvas>

<script>

let canvas=document.getElementById("simCanvas")
let ctx=canvas.getContext("2d")

let people=[]
let diseases=[]
let timer=null
let timeStep=0
let chart=null

const colors=[
"red","blue","purple","orange","brown",
"black","magenta","cyan","gold","green"
]

function updateSliderLabels(){

popValue.innerText=popSlider.value
startValue.innerText=startSlider.value
moveValue.innerText=moveSlider.value
speedValue.innerText=speedSlider.value

}

document.querySelectorAll("input[type=range]").forEach(s=>{
s.oninput=updateSliderLabels
})

function addDisease(){

let id=diseases.length

diseases.push({
name:"Disease "+(id+1),
color:colors[id%colors.length],
infectivity:0.4,
model:"exponential"
})

renderDiseaseControls()
reset()

}

function removeDisease(index){

diseases.splice(index,1)

renderDiseaseControls()
reset()

}

function renderDiseaseControls(){

let container=document.getElementById("diseaseControls")
container.innerHTML=""

diseases.forEach((d,i)=>{

let div=document.createElement("div")
div.className="diseaseBlock"

div.innerHTML=`

<input value="${d.name}"
oninput="diseases[${i}].name=this.value; reset()">

<br>

<span style="color:${d.color}"><b>Color</b></span>

<br>

Infectivity
<input type="range"
min="0"
max="1"
step="0.01"
value="${d.infectivity}"
oninput="diseases[${i}].infectivity=parseFloat(this.value)">

<br>

Model
<select onchange="diseases[${i}].model=this.value">

<option value="exponential" ${d.model==="exponential"?"selected":""}>Exponential</option>
<option value="quadratic" ${d.model==="quadratic"?"selected":""}>Quadratic</option>
<option value="linear" ${d.model==="linear"?"selected":""}>Linear</option>

</select>

<br>

<button onclick="removeDisease(${i})">Remove</button>

`

container.appendChild(div)

})

}

function reset(){

pause()

people=[]
timeStep=0

let population=parseInt(popSlider.value)
let start=parseInt(startSlider.value)

for(let i=0;i<population;i++){

people.push({
x:Math.random()*canvas.width,
y:Math.random()*canvas.height,
disease:null
})

}

let index=0

for(let d=0;d<diseases.length;d++){

for(let i=0;i<start;i++){

if(index<people.length){
people[index].disease=d
index++
}

}

}

initGraph()
draw()
updateStats()

}

function step(){

timeStep++

let moveSpeed=parseFloat(moveSlider.value)

let healthyList=[]
let counts=new Array(diseases.length).fill(0)

for(let p of people){

if(p.disease===null) healthyList.push(p)
else counts[p.disease]++

}

for(let p of people){

p.x+=(Math.random()-0.5)*moveSpeed*4
p.y+=(Math.random()-0.5)*moveSpeed*4

p.x=Math.max(0,Math.min(canvas.width,p.x))
p.y=Math.max(0,Math.min(canvas.height,p.y))

if(p.disease===null) continue

let disease=diseases[p.disease]

let base=disease.infectivity
let ratio=counts[p.disease]/people.length

let prob=base

if(disease.model==="linear") prob=base*ratio
if(disease.model==="quadratic") prob=base*ratio*ratio

if(Math.random()<prob && healthyList.length>0){

let target=healthyList.pop()
target.disease=p.disease

}

}

draw()
updateStats()
updateGraph()

}

function draw(){

ctx.clearRect(0,0,canvas.width,canvas.height)

for(let p of people){

ctx.beginPath()
ctx.arc(p.x,p.y,4,0,Math.PI*2)

if(p.disease===null)
ctx.fillStyle="white"
else
ctx.fillStyle=diseases[p.disease].color

ctx.fill()
ctx.stroke()

}

}

function updateStats(){

let healthy=0

for(let p of people){
if(p.disease===null) healthy++
}

time.innerText=timeStep
document.getElementById("healthy").innerText=healthy

}

function start(){

pause()
timer=setInterval(step,parseInt(speedSlider.value))

}

function pause(){

if(timer){
clearInterval(timer)
timer=null
}

}

function initGraph(){

if(chart) chart.destroy()

let ctx=document.getElementById("graphCanvas")

let datasets=[{
label:"Healthy",
borderColor:"green",
data:[people.filter(p=>p.disease===null).length]
}]

diseases.forEach((d,i)=>{

datasets.push({
label:d.name,
borderColor:d.color,
data:[people.filter(p=>p.disease===i).length]
})

})

chart=new Chart(ctx,{

type:"line",

data:{
labels:[0],
datasets:datasets
},

options:{
animation:false,
scales:{
x:{title:{display:true,text:"Time"}},
y:{title:{display:true,text:"Population"}}
}
}

})

}

function updateGraph(){

chart.data.labels.push(timeStep)

let healthy=0
let counts=new Array(diseases.length).fill(0)

for(let p of people){

if(p.disease===null) healthy++
else counts[p.disease]++

}

chart.data.datasets[0].data.push(healthy)

for(let i=0;i<diseases.length;i++){

chart.data.datasets[i+1].data.push(counts[i])

}

chart.update()

}

updateSliderLabels()

addDisease()

</script>

</body>
</html>
